# Copy to secret.yaml and fill in real values before applying.
# secret.yaml is gitignored; this template is safe to commit.
#
# Quick one-liner to generate from your .env file:
#   kubectl -n research-agent create secret generic research-agent-secrets \
#     --from-env-file=.env --dry-run=client -o yaml > k8s/secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: research-agent-secrets
  namespace: research-agent
type: Opaque
stringData:
  GOOGLE_API_KEY: "REPLACE_ME"
  OPENAI_API_KEY: ""
  TAVILY_API_KEY: ""
  SERP_API_KEY: ""
